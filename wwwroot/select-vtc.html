<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect to VTC</title>
  <style>
    body { margin:0; font-family:Segoe UI, Arial, sans-serif; background:#08111d; color:#f2f7ff; padding:32px; }
    .card { max-width:720px; margin:0 auto; background:#12203a; border:1px solid rgba(255,255,255,.1); border-radius:18px; padding:24px; }
    h1 { margin-top:0; }
    .row { margin:14px 0; }
    select, input, button { width:100%; padding:14px; border-radius:12px; border:1px solid rgba(255,255,255,.16); background:#07121f; color:#fff; }
    button { cursor:pointer; background:#4f63ff; border:none; font-weight:700; }
    .muted { color:#9eb1c9; font-size:14px; }
    #statusText { margin:12px 0 6px; font-weight:700; }
    #debugText { white-space:pre-wrap; color:#9eb1c9; font-size:12px; margin-top:12px; }
    a.btn { display:inline-block; padding:12px 16px; border-radius:12px; background:#4f63ff; color:#fff; text-decoration:none; font-weight:700; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Connect to Your VTC</h1>
    <div class="row"><a class="btn" href="/login">Login with Discord</a></div>
    <div id="statusText">Loading your Discord session...</div>
    <div class="muted" id="helpText">After login, your VTC list should appear below.</div>
    <div class="row">
      <label for="serverSelect" class="muted">Select Your VTC</label>
      <select id="serverSelect">
        <option value="">Loading VTCs...</option>
      </select>
    </div>
    <div class="row">
      <label for="pairCode" class="muted">Pairing Code (optional)</label>
      <input id="pairCode" placeholder="Enter pairing code if your flow requires it" />
    </div>
    <div class="row"><button id="enterVtcBtn" type="button">Enter VTC Portal</button></div>
    <div id="debugText"></div>
  </div>

<script>
(async function () {
  const serverSelect = document.getElementById("serverSelect");
  const enterBtn = document.getElementById("enterVtcBtn");
  const statusText = document.getElementById("statusText");
  const helpText = document.getElementById("helpText");
  const debugText = document.getElementById("debugText");

  function setStatus(msg, isError) {
    statusText.textContent = msg || "";
    statusText.style.color = isError ? "#ffb4b4" : "#d7ffeb";
  }

  function setDebug(obj) {
    try { debugText.textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2); }
    catch { debugText.textContent = String(obj); }
  }

  async function getJson(url, options) {
    const res = await fetch(url, {
      credentials: "include",
      headers: { "Accept": "application/json", ...(options && options.body ? {"Content-Type":"application/json"} : {}) },
      ...options
    });
    const text = await res.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch { data = { raw: text }; }
    return { res, data };
  }

  function populate(vtcs) {
    serverSelect.innerHTML = "";
    const p = document.createElement("option");
    p.value = "";
    p.textContent = vtcs.length ? "Select your VTC..." : "No VTCs found";
    serverSelect.appendChild(p);

    vtcs.forEach(v => {
      const opt = document.createElement("option");
      opt.value = v.guildId || "";
      opt.textContent = v.vtcName || v.name || v.guildId || "Unnamed VTC";
      serverSelect.appendChild(opt);
    });
  }

  // auth
  const me = await getJson("/api/auth/me");
  if (!me.res.ok || !me.data || !me.data.ok) {
    setStatus("Not logged in. Click Login with Discord.", true);
    helpText.textContent = "This page only works after Discord sign-in.";
    setDebug({ authStatus: me.res.status, authData: me.data });
    return;
  }

  // vtcs
  const vtcsResp = await getJson("/api/auth/vtcs");
  const vtcs = Array.isArray(vtcsResp.data && vtcsResp.data.data) ? vtcsResp.data.data : [];
  populate(vtcs);

  if (!vtcsResp.res.ok) {
    setStatus("Failed loading VTC list.", true);
    setDebug({ vtcsStatus: vtcsResp.res.status, vtcsData: vtcsResp.data });
    return;
  }

  if (!vtcs.length) {
    setStatus("No VTCs returned by server.", true);
    setDebug({ vtcsStatus: vtcsResp.res.status, vtcsData: vtcsResp.data });
    return;
  }

  setStatus("Select your VTC and continue.", false);
  helpText.textContent = "Your server is returning VTCs. Choose one below.";

  enterBtn.addEventListener("click", async () => {
    const guildId = serverSelect.value;
    if (!guildId) {
      setStatus("Please select your VTC.", true);
      return;
    }

    setStatus("Opening your VTC...", false);
    const sel = await getJson("/api/auth/select-vtc", {
      method: "POST",
      body: JSON.stringify({ guildId })
    });

    if (!sel.res.ok || !sel.data || !sel.data.ok) {
      setStatus("Could not select VTC.", true);
      setDebug({ selectStatus: sel.res.status, selectData: sel.data });
      return;
    }

    window.location.href = sel.data.redirectUrl || "/portal.html";
  });
})();
</script>
</body>
</html>
