<style>
body{margin:0;background:#020617;color:white;font-family:Segoe UI,Arial,sans-serif}
header{padding:18px 24px;background:#111827;border-bottom:1px solid #334155}
main{max-width:1250px;margin:auto;padding:22px}
.card{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:18px;margin-bottom:18px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.stat{font-size:30px;font-weight:800}
.muted{color:#94a3b8}
#map{height:660px;border-radius:14px;border:1px solid #334155;overflow:hidden;background:#020617}

/* ===== FIXED POPUP STYLE ===== */
.maplibregl-popup-content{
  background:#0f172a !important;
  color:#f8fafc !important;
  border:1px solid #38bdf8 !important;
  border-radius:12px !important;
  box-shadow:0 0 18px rgba(56,189,248,.35) !important;
  font-family:Segoe UI,Arial,sans-serif !important;
  font-size:13px !important;
  line-height:1.45 !important;
}

.maplibregl-popup-tip{
  border-top-color:#0f172a !important;
  border-bottom-color:#0f172a !important;
}

.maplibregl-popup-close-button{
  color:#f8fafc !important;
  font-size:18px !important;
}

/* ============================ */

.truck-marker{width:18px;height:18px;border-radius:50%;border:3px solid white;background:#38bdf8;box-shadow:0 0 14px rgba(56,189,248,.95)}
.truck-marker.driving{background:#22c55e;box-shadow:0 0 16px rgba(34,197,94,.95)}
.truck-marker.stopped{background:#f59e0b;box-shadow:0 0 16px rgba(245,158,11,.95)}
.truck-marker.offline{background:#64748b;box-shadow:0 0 12px rgba(100,116,139,.8)}
.truck-marker.unknown{background:#38bdf8;box-shadow:0 0 14px rgba(56,189,248,.95)}
.pickup-marker{width:18px;height:18px;border-radius:6px;background:#22c55e;border:2px solid white;box-shadow:0 0 14px rgba(34,197,94,.9)}
.drop-marker{width:18px;height:18px;border-radius:6px;background:#f59e0b;border:2px solid white;box-shadow:0 0 14px rgba(245,158,11,.9)}
.marker-label{position:absolute;top:-24px;left:50%;transform:translateX(-50%);background:#020617;border:1px solid #334155;padding:3px 7px;border-radius:7px;font-size:11px;white-space:nowrap;color:white}
.marker-wrap{position:relative;width:20px;height:20px}
.state-label{color:#7dd3fc;font-weight:800;font-size:13px;text-shadow:0 2px 6px #000;opacity:.8;pointer-events:none}
.city-label{color:#f8fafc;font-weight:700;font-size:11px;text-shadow:0 2px 5px #000;opacity:.92;pointer-events:none}
.company-label{color:#bbf7d0;font-weight:800;font-size:11px;text-shadow:0 2px 5px #000;opacity:.95;pointer-events:none}
.legend{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0;color:#cbd5e1;font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block;border:1px solid white}
.legend-green{background:#22c55e}
.legend-yellow{background:#f59e0b}
.legend-gray{background:#64748b}
.legend-blue{background:#38bdf8}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #334155}
.table{width:100%;border-collapse:collapse}
.table td,.table th{padding:9px;border-bottom:1px solid #334155;text-align:left}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}
button{background:#1f2937;color:white;border:1px solid #334155;border-radius:10px;padding:8px 11px;cursor:pointer}
button.active{background:#075985;border-color:#38bdf8}
</style>
