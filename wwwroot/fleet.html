<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>OverWatch ELD | Fleet</title><style>
:root{--panel:rgba(13,22,38,.94);--soft:rgba(255,255,255,.045);--text:#f2f7ff;--muted:#9eb1c9;--line:rgba(255,255,255,.10);--accent:#4da3ff;--accent2:#76beff;--shadow:0 20px 54px rgba(0,0,0,.32)}*{box-sizing:border-box}body{margin:0;font-family:"Segoe UI",Arial,sans-serif;color:var(--text);background:linear-gradient(rgba(7,12,22,.86),rgba(7,12,22,.92)),url('https://www.driverfirst.com/wp-content/uploads/2025/01/freightliner-classic.png') center/cover fixed;min-height:100vh}a{text-decoration:none;color:inherit}.container{width:min(1180px,calc(100% - 32px));margin:0 auto}.topbar{background:rgba(7,13,24,.82);border-bottom:1px solid var(--line);backdrop-filter:blur(16px);position:sticky;top:0;z-index:10}.topbar-inner{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:14px 0;flex-wrap:wrap}.btn{display:inline-flex;border-radius:13px;padding:11px 15px;border:1px solid var(--line);background:rgba(255,255,255,.045);font-weight:750}.hero{padding:42px 0 24px}.hero-card,.panel{background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}.hero-card{border-radius:28px;padding:34px}.panel{border-radius:20px;padding:24px;margin-bottom:22px}h1{font-size:clamp(2.1rem,5vw,3.8rem);margin:0 0 10px}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.truck{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:18px}.truck h3{margin:0 0 8px}.truck p{color:var(--muted);margin:4px 0}.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.stat{background:var(--soft);border:1px solid var(--line);border-radius:16px;padding:16px}.stat strong{display:block;margin-bottom:6px}@media(max-width:1000px){.grid,.stat-grid{grid-template-columns:1fr}}</style></head><body><header class="topbar"><div class="container topbar-inner"><div><strong id="pageVtcName">Fleet</strong><div class="muted">Company trucks and equipment</div></div><div><a class="btn" id="backPortal" href="/portal.html">Portal</a> <a class="btn" href="/">Website</a></div></div></header><main><section class="hero"><div class="container"><div class="hero-card"><h1>Company Fleet</h1><p class="muted" id="fleetIntro">Every truck in the company can be shown here.</p><div class="stat-grid"><div class="stat"><strong id="truckCount">0</strong><span class="muted">Trucks listed</span></div><div class="stat"><strong id="activeCount">0</strong><span class="muted">Active / assigned</span></div><div class="stat"><strong id="serviceCount">0</strong><span class="muted">Needs service</span></div><div class="stat"><strong id="garageCount">0</strong><span class="muted">Garages</span></div></div></div></div></section><section><div class="container"><div class="panel"><h2>Trucks</h2><p class="muted">This page reads fleet truck data from VTC settings or fleet endpoints when available.</p><div class="grid" id="fleetGrid"><div class="muted">Loading fleet...</div></div></div></div></section></main><script>
(async function(){const q=n=>new URL(location.href).searchParams.get(n)||'',esc=v=>String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));async function getJson(url){const res=await fetch(url,{credentials:'include',headers:{Accept:'application/json'}});const text=await res.text();let data=null;try{data=text?JSON.parse(text):null}catch{}return{res,data}}async function firstJson(urls){for(const u of urls){try{const x=await getJson(u);if(x.res.ok&&x.data)return x}catch{}}return{data:null}}function arr(d){if(!d)return[];if(Array.isArray(d))return d;if(Array.isArray(d.data))return d.data;if(Array.isArray(d.trucks))return d.trucks;if(Array.isArray(d.fleet))return d.fleet;if(Array.isArray(d.items))return d.items;return[]}function parse(v){if(!v)return[];if(Array.isArray(v))return v;try{return JSON.parse(v)}catch{return[]}}const guildId=q('guildId');document.getElementById('backPortal').href='/portal.html?guildId='+encodeURIComponent(guildId);let vtcs=[];try{const v=await getJson('/api/auth/vtcs');if(v.data&&Array.isArray(v.data.data))vtcs=v.data.data}catch{}const selected=vtcs.find(x=>(x.guildId||'')===guildId)||{};document.getElementById('pageVtcName').textContent=(selected.vtcName||selected.name||'Fleet')+' Fleet';let settings={};try{const s=await getJson('/api/vtc/settings?guildId='+encodeURIComponent(guildId));settings=s.data&&s.data.data?s.data.data:{}}catch{}let trucks=[];const live=await firstJson(['/api/vtc/fleet?guildId='+encodeURIComponent(guildId),'/api/fleet?guildId='+encodeURIComponent(guildId),'/api/trucks?guildId='+encodeURIComponent(guildId),'/api/vtc/trucks?guildId='+encodeURIComponent(guildId)]);trucks=arr(live.data);if(!trucks.length)trucks=parse(settings.fleetTrucks||settings.trucks||settings.companyTrucks);const garages=parse(settings.garages||settings.companyGarages);document.getElementById('truckCount').textContent=trucks.length;document.getElementById('activeCount').textContent=trucks.filter(t=>t.driver||t.assignedDriver||t.status==='Active').length;document.getElementById('serviceCount').textContent=trucks.filter(t=>String(t.serviceDue||t.needsService||t.condition||'').toLowerCase().includes('true')||Number(t.condition)<50).length;document.getElementById('garageCount').textContent=garages.length;const grid=document.getElementById('fleetGrid');grid.innerHTML='';if(!trucks.length){grid.innerHTML='<div class="muted">No trucks have been listed yet. Add fleetTrucks in VTC settings/manage page.</div>';return}trucks.forEach(t=>{const name=t.name||t.truckNumber||t.unit||t.number||'Truck',driver=t.driver||t.assignedDriver||'Unassigned',model=t.model||t.makeModel||t.truck||'Truck',plate=t.plate||t.licensePlate||'-',odo=t.odometer||t.miles||'-',loc=t.location||t.lastLocation||'-',status=t.status||t.condition||'Available';grid.insertAdjacentHTML('beforeend','<div class="truck"><h3>'+esc(name)+'</h3><p><strong>Model:</strong> '+esc(model)+'</p><p><strong>Driver:</strong> '+esc(driver)+'</p><p><strong>Plate:</strong> '+esc(plate)+'</p><p><strong>Odometer:</strong> '+esc(odo)+'</p><p><strong>Location:</strong> '+esc(loc)+'</p><p><strong>Status:</strong> '+esc(status)+'</p></div>')})})();
</script></body></html>
