<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Fleet</title><style>body{font-family:Segoe UI,Arial;background:#08111d;color:#f2f7ff;margin:0}.container{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:24px 0}.top{background:#07111f;border-bottom:1px solid #ffffff1a}.btn{display:inline-block;padding:10px 14px;border:1px solid #ffffff1a;border-radius:12px;color:#fff;text-decoration:none;background:#ffffff12}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.card{background:#0d1626;border:1px solid #ffffff1a;border-radius:18px;padding:18px}.muted{color:#9eb1c9}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top"><div class="container"><a class="btn" id="portal">Portal</a></div></div><main class="container"><h1>Company Fleet</h1><p class="muted" id="summary">Loading trucks...</p><div class="grid" id="grid"></div></main><script>
(async()=>{const q=n=>new URL(location.href).searchParams.get(n)||'',guildId=q('guildId'),e=id=>document.getElementById(id),esc=v=>String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));e('portal').href='/portal.html?guildId='+encodeURIComponent(guildId);let d=await fetch('/api/vtc/portal/fleet?guildId='+encodeURIComponent(guildId),{credentials:'include'}).then(r=>r.json()).catch(()=>({data:[]}));let trucks=Array.isArray(d.data)?d.data:[];e('summary').textContent=trucks.length+' truck'+(trucks.length===1?'':'s')+' listed.';e('grid').innerHTML=trucks.length?trucks.map(t=>'<div class="card"><h3>'+esc(t.name||t.truckNumber||'Truck')+'</h3><p class="muted">Model: '+esc(t.model||'-')+'</p><p class="muted">Driver: '+esc(t.driver||'-')+'</p><p class="muted">Plate: '+esc(t.plate||'-')+'</p><p class="muted">Odometer: '+esc(t.odometer||'-')+'</p><p class="muted">Location: '+esc(t.location||'-')+'</p><p class="muted">Status: '+esc(t.status||'-')+'</p></div>').join(''):'<div class="muted">No trucks added yet.</div>'})();
</script></body></html>
