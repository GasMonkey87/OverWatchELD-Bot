<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>VTC Portal</title>

<link href="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
body{background:#020617;color:white;font-family:Segoe UI;margin:0}
#map{height:600px;border-radius:12px;margin:20px;border:1px solid #334155}

.truck-marker{
  width:14px;height:14px;
  border-radius:50%;
  background:#38bdf8;
  border:3px solid white;
}

.marker-label{
  position:absolute;
  top:-24px;
  left:50%;
  transform:translateX(-50%);
  background:#020617;
  border:1px solid #334155;
  padding:2px 6px;
  font-size:11px;
  border-radius:6px;
  white-space:nowrap;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

const API = location.origin;
const guildId = new URLSearchParams(location.search).get("guildId");

let map;
let markers = [];

function makeMarker(type,label){
  const wrap = document.createElement("div");

  // 🔥 FIX: lock anchor center
  wrap.style.position = "relative";
  wrap.style.width = "20px";
  wrap.style.height = "20px";
  wrap.style.transform = "translate(-50%,-50%)";

  const dot = document.createElement("div");
  dot.className = type;

  const text = document.createElement("div");
  text.className = "marker-label";
  text.textContent = label;

  wrap.appendChild(dot);
  wrap.appendChild(text);

  return wrap;
}

function getLngLat(u){
  const lng = u.longitude ?? u.lng ?? u.lon;
  const lat = u.latitude ?? u.lat;

  if(lng == null || lat == null) return null;
  return [lng,lat];
}

async function loadTelemetry(){
  const res = await fetch(`${API}/api/telemetry?guildId=${guildId}`);
  const json = await res.json();

  markers.forEach(m=>m.remove());
  markers=[];

  (json.data||[]).forEach(u=>{
    const ll = getLngLat(u);
    if(!ll) return;

    const marker = new maplibregl.Marker({
      element: makeMarker("truck-marker", u.driver || "Driver"),
      anchor: "center"
    })
    .setLngLat(ll)
    .addTo(map);

    markers.push(marker);
  });
}

function init(){
  map = new maplibregl.Map({
    container:"map",
    style:{
      version:8,
      sources:{},
      layers:[{
        id:"bg",
        type:"background",
        paint:{ "background-color":"#020617" }
      }]
    },
    center:[-98,39],
    zoom:4
  });

  setInterval(loadTelemetry,3000);
}

init();

</script>
</body>
</html>
