<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OverWatch ELD</title>

<style>
/* KEEP YOUR EXISTING STYLES (unchanged for brevity) */
body { margin:0; font-family:Arial; background:#0b1220; color:#e5e7eb; }
.btn { padding:12px 18px; border-radius:10px; cursor:pointer; border:none; }
.btn-primary { background:#2563eb; color:white; }
.btn-secondary { background:#334155; color:white; }
</style>
</head>

<body>

<!-- YOUR EXISTING PAGE CONTENT (unchanged) -->

<section style="text-align:center; padding:40px;">
  <a class="btn btn-primary" href="/downloads.html">Download Now</a>

  <a class="btn btn-secondary"
     href="https://discord.gg/rk2WVne8hs"
     target="_blank">
     Join the Community
  </a>

  <button class="btn btn-secondary" onclick="openIssueModal()">
    Report an Issue
  </button>
</section>

<!-- 🔥 ISSUE MODAL -->
<div id="issueModal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:9999;
align-items:center;
justify-content:center;
padding:20px;
">
  <div style="
  background:#111827;
  border-radius:16px;
  padding:20px;
  width:100%;
  max-width:500px;
  ">

    <h2>Report an Issue</h2>

    <input id="email" placeholder="Your Email"
      style="width:100%; margin-bottom:10px; padding:10px;" />

    <input id="subject" placeholder="Subject"
      style="width:100%; margin-bottom:10px; padding:10px;" />

    <textarea id="message" placeholder="Describe the issue"
      style="width:100%; height:120px; margin-bottom:10px; padding:10px;"></textarea>

    <div style="display:flex; gap:10px;">
      <button class="btn btn-primary" onclick="sendIssue()">Send</button>
      <button class="btn btn-secondary" onclick="closeIssueModal()">Cancel</button>
    </div>

    <div id="status" style="margin-top:10px;"></div>

  </div>
</div>

<script>
function openIssueModal() {
  document.getElementById("issueModal").style.display = "flex";
}

function closeIssueModal() {
  document.getElementById("issueModal").style.display = "none";
}

async function sendIssue() {
  const body = {
    email: document.getElementById("email").value,
    subject: document.getElementById("subject").value,
    message: document.getElementById("message").value
  };

  const status = document.getElementById("status");

  if (!body.email || !body.subject || !body.message) {
    status.innerText = "Fill all fields";
    return;
  }

  status.innerText = "Sending...";

  const res = await fetch("/api/report-issue", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (res.ok) {
    status.innerText = "Sent successfully!";
    setTimeout(closeIssueModal, 1000);
  } else {
    status.innerText = "Failed to send";
  }
}
</script>

</body>
</html>
