<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OverWatch ELD - VTC Portal</title>

<style>
body{margin:0;font-family:Segoe UI;background:#020617;color:#fff}
.hero{padding:40px;background:#0f172a}
h1{margin:0}
.main{padding:20px;max-width:1200px;margin:auto}
.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.mapbox{height:350px;border-radius:16px;overflow:hidden;position:relative;background:#020617}
.pin{position:absolute;width:14px;height:14px;border-radius:50%;background:#38bdf8;border:2px solid white}
.pin label{position:absolute;left:18px;top:-6px;font-size:12px;background:#020617;padding:4px;border-radius:6px;border:1px solid #334155}
</style>
</head>

<body>

<div class="hero">
  <h1 id="title">Loading...</h1>
  <p id="desc"></p>
</div>

<div class="main">

<div class="card">
<h2>Live Map</h2>
<div id="map" class="mapbox"></div>
</div>

</div>

<script>
const API = location.origin.includes("localhost")
 ? "https://overwatcheld-bot-5.up.railway.app"
 : location.origin;

const guildId = new URLSearchParams(location.search).get("guildId");

// 🔥 CHANGE THIS ONLY IF YOUR TILE PATH IS DIFFERENT
const TILE_URL = "/map/tiles/{z}/{x}/{y}.png";

async function api(path){
  try{
    const res = await fetch(API + path);
    return await res.json();
  }catch{
    return {};
  }
}

async function load(){
  const portal = await api(`/api/vtc/portal/data?guildId=${guildId}`);
  const telemetry = await api(`/api/telemetry?guildId=${guildId}`);

  const data = portal.data || {};
  const units = telemetry.data || [];

  title.textContent = data.siteTitle || "VTC Portal";
  desc.textContent = data.welcomeText || "";

  drawMap(units);
}

function drawMap(units){
  const map = document.getElementById("map");
  map.innerHTML = "";

  const width = map.clientWidth;
  const height = map.clientHeight;

  // draw tiles
  const tileSize = 256;
  const cols = Math.ceil(width / tileSize)+1;
  const rows = Math.ceil(height / tileSize)+1;

  for(let y=0;y<rows;y++){
    for(let x=0;x<cols;x++){
      const img = document.createElement("img");
      img.src = TILE_URL
        .replace("{z}",3)
        .replace("{x}",x)
        .replace("{y}",y);

      img.style.position="absolute";
      img.style.left = x*tileSize+"px";
      img.style.top = y*tileSize+"px";
      img.style.width = tileSize+"px";
      img.style.height = tileSize+"px";

      map.appendChild(img);
    }
  }

  // no trucks
  if(!units.length){
    const msg = document.createElement("div");
    msg.innerHTML = "No telemetry data. Start ATS + ELD.";
    msg.style.position="absolute";
    msg.style.top="50%";
    msg.style.left="50%";
    msg.style.transform="translate(-50%,-50%)";
    map.appendChild(msg);
    return;
  }

  // draw trucks
  units.forEach(u=>{
    const x = Number(u.x || u.mapX || 0);
    const y = Number(u.y || u.mapY || 0);

    const px = (x/10000)*width;
    const py = (y/10000)*height;

    const pin = document.createElement("div");
    pin.className="pin";
    pin.style.left = px+"px";
    pin.style.top = py+"px";

    const label = document.createElement("label");
    label.textContent = u.driver || u.truck || "Unit";

    pin.appendChild(label);
    map.appendChild(pin);
  });
}

load();
setInterval(load,30000);
</script>

</body>
</html>
