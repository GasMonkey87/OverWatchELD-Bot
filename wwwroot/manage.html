<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OverWatch ELD - Management</title>

<style>
body {
    margin:0;
    font-family:Segoe UI;
    background:#0f172a;
    color:white;
}

/* Sidebar */
.sidebar {
    width:220px;
    height:100vh;
    background:#020617;
    position:fixed;
    padding-top:20px;
}

.sidebar button {
    display:block;
    width:100%;
    padding:15px;
    border:none;
    background:none;
    color:white;
    text-align:left;
    cursor:pointer;
}

.sidebar button:hover {
    background:#1e293b;
}

/* Main */
.main {
    margin-left:220px;
    padding:20px;
}

/* Cards */
.card {
    background:#1e293b;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

/* Driver list */
.driver {
    padding:10px;
    border-bottom:1px solid #334155;
    cursor:pointer;
}

.driver:hover {
    background:#334155;
}

/* Modal */
.modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
}

.modal-content {
    background:#020617;
    margin:10% auto;
    padding:20px;
    width:400px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
    <button onclick="loadPage('dashboard')">Dashboard</button>
    <button onclick="loadPage('drivers')">Drivers</button>
    <button onclick="loadPage('fleet')">Fleet</button>
    <button onclick="loadPage('garage')">Garage</button>
    <button onclick="loadPage('portal')">Portal</button>
    <button onclick="loadPage('announcements')">Announcements</button>
</div>

<div class="main" id="content">
    Loading...
</div>

<!-- Driver Modal -->
<div id="driverModal" class="modal">
  <div class="modal-content" id="driverDetails"></div>
</div>

<script>
const API = "https://overwatcheld-bot-5.up.railway.app";
const guildId = new URLSearchParams(window.location.search).get("guildId");

/* ROUTER */
function loadPage(page){
    if(page==="dashboard") loadDashboard();
    if(page==="drivers") loadDrivers();
    if(page==="fleet") loadFleet();
    if(page==="garage") loadGarage();
    if(page==="portal") loadPortal();
    if(page==="announcements") loadAnnouncements();
}

/* DASHBOARD */
async function loadDashboard(){
    document.getElementById("content").innerHTML = `
        <div class="card"><h2>Dashboard</h2></div>
    `;
}

/* DRIVERS */
async function loadDrivers(){
    let res = await fetch(`${API}/api/vtc/roster?guildId=${guildId}`);
    let data = await res.json();

    let html = `<div class="card"><h2>Drivers</h2>`;

    if(!data.data || data.data.length===0){
        html += "<p>No drivers found</p>";
    } else {
        data.data.forEach(d=>{
            html += `
                <div class="driver" onclick='showDriver(${JSON.stringify(d)})'>
                    ${d.name}
                </div>
            `;
        });
    }

    html += "</div>";
    document.getElementById("content").innerHTML = html;
}

function showDriver(d){
    document.getElementById("driverDetails").innerHTML = `
        <h2>${d.name}</h2>
        <p>ID: ${d.discordUserId}</p>
        <p>Miles: ${d.miles || 0}</p>
    `;
    document.getElementById("driverModal").style.display="block";
}

/* FLEET */
async function loadFleet(){
    let res = await fetch(`${API}/api/fleet?guildId=${guildId}`);
    let data = await res.json();

    let html = `<div class="card"><h2>Fleet</h2>`;

    if(!data.data){
        html += "<p>No trucks found</p>";
    } else {
        data.data.forEach(t=>{
            html += `
                <div class="driver">
                    Truck ${t.truckNumber} - ${t.driver || "Unassigned"}
                </div>
            `;
        });
    }

    html += "</div>";
    document.getElementById("content").innerHTML = html;
}

/* GARAGE */
function loadGarage(){
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h2>Garage</h2>
            <button onclick="buyGarage()">Buy Garage</button>
        </div>
    `;
}

function buyGarage(){
    alert("Garage purchased (mock)");
}

/* PORTAL */
function loadPortal(){
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h2>Portal Settings</h2>
            <input id="desc" placeholder="Description"/><br><br>
            <button onclick="savePortal()">Save</button>
        </div>
    `;
}

async function savePortal(){
    alert("Saved (hook API next)");
}

/* ANNOUNCEMENTS */
function loadAnnouncements(){
    document.getElementById("content").innerHTML = `
        <div class="card">
            <h2>Announcements</h2>
            <textarea id="msg"></textarea><br>
            <button onclick="sendAnnouncement()">Send</button>
        </div>
    `;
}

async function sendAnnouncement(){
    let msg = document.getElementById("msg").value;

    await fetch(`${API}/api/announcements`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({guildId,text:msg})
    });

    alert("Sent");
}

/* INIT */
loadPage("dashboard");

/* CLOSE MODAL */
window.onclick = function(e){
    if(e.target.id==="driverModal"){
        document.getElementById("driverModal").style.display="none";
    }
}
</script>

</body>
</html>
