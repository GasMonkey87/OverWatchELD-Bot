<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OverWatch ELD</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: #e5e7eb;
  text-align: center;
}

header {
  padding: 40px 20px;
  background: linear-gradient(135deg, #111827, #1e3a8a);
}

h1 { margin: 0; font-size: 40px; }

.subtitle { color: #cbd5e1; margin-top: 10px; }

.section {
  padding: 50px 20px;
}

.btn {
  display: inline-block;
  padding: 14px 20px;
  border-radius: 10px;
  margin: 10px;
  font-weight: bold;
  text-decoration: none;
  cursor: pointer;
}

.btn-primary { background: #2563eb; color: white; }
.btn-secondary { background: #334155; color: white; }
</style>
</head>

<body>

<header>
  <h1>OverWatch ELD</h1>
  <div class="subtitle">The ELD you can count on.</div>
</header>

<div class="section">
  <h2>Professional VTC Fleet Management</h2>
  <p>Run your fleet like a real operation with dispatch, telemetry, logs, and Discord integration.</p>

  <a class="btn btn-primary" href="/downloads.html">Download Now</a>

  <a class="btn btn-secondary"
     href="https://discord.gg/rk2WVne8hs"
     target="_blank">
     Join the Community
  </a>

  <button class="btn btn-secondary" onclick="openIssueModal()">
    Report an Issue
  </button>
</div>

<!-- 🔥 ISSUE MODAL -->
<div id="issueModal" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:9999;
align-items:center;
justify-content:center;
padding:20px;
">
  <div style="
  background:#111827;
  border-radius:16px;
  padding:20px;
  width:100%;
  max-width:500px;
  ">

    <h2>Report an Issue</h2>

    <input id="email" placeholder="Your Email"
      style="width:100%; margin-bottom:10px; padding:10px;" />

    <input id="subject" placeholder="Subject"
      style="width:100%; margin-bottom:10px; padding:10px;" />

    <textarea id="message" placeholder="Describe the issue"
      style="width:100%; height:120px; margin-bottom:10px; padding:10px;"></textarea>

    <div style="display:flex; gap:10px; justify-content:center;">
      <button class="btn btn-primary" onclick="sendIssue()">Send</button>
      <button class="btn btn-secondary" onclick="closeIssueModal()">Cancel</button>
    </div>

    <div id="status" style="margin-top:10px;"></div>

  </div>
</div>

<script>
function openIssueModal() {
  document.getElementById("issueModal").style.display = "flex";
}

function closeIssueModal() {
  document.getElementById("issueModal").style.display = "none";
}

async function sendIssue() {
  const body = {
    email: document.getElementById("email").value,
    subject: document.getElementById("subject").value,
    message: document.getElementById("message").value
  };

  const status = document.getElementById("status");

  if (!body.email || !body.subject || !body.message) {
    status.innerText = "Fill all fields";
    return;
  }

  status.innerText = "Sending...";

  const res = await fetch("/api/report-issue", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body)
  });

  if (res.ok) {
    status.innerText = "Sent successfully!";
    setTimeout(closeIssueModal, 1000);
  } else {
    status.innerText = "Failed to send";
  }
}
</script>

</body>
</html>
